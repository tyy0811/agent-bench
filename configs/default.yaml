agent:
  max_iterations: 3
  temperature: 0.0

provider:
  default: openai
  models:
    gpt-4o-mini:
      input_cost_per_mtok: 0.15
      output_cost_per_mtok: 0.60
    claude-sonnet-4-20250514:
      input_cost_per_mtok: 3.0
      output_cost_per_mtok: 15.0
    claude-haiku-4-5-20251001:
      input_cost_per_mtok: 0.80
      output_cost_per_mtok: 4.0

rag:
  chunking:
    strategy: recursive
    chunk_size: 512
    chunk_overlap: 64
  retrieval:
    strategy: hybrid
    rrf_k: 60
    candidates_per_system: 10
    top_k: 5
  reranker:
    enabled: true
    model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
    top_k: 5
  refusal_threshold: 0.02  # provisional — pending eval sweep
  store_path: .cache/store

embedding:
  model: all-MiniLM-L6-v2
  cache_dir: .cache/embeddings

retry:
  max_retries: 3
  base_delay: 1.0
  max_delay: 8.0

memory:
  enabled: true
  db_path: data/conversations.db
  max_turns: 10

serving:
  host: 0.0.0.0
  port: 8000
  request_timeout_seconds: 30
  rate_limit_rpm: 10

evaluation:
  judge_provider: openai
  golden_dataset: agent_bench/evaluation/datasets/tech_docs_golden.json

security:
  injection:
    enabled: true
    action: block
    tiers:
      - heuristic
      - classifier
    classifier_url: ""
  pii:
    enabled: true
    mode: redact
    redact_patterns: [EMAIL, PHONE, SSN, CREDIT_CARD, IP_ADDRESS]
    use_ner: false
    ner_entities: [PERSON]
  output:
    enabled: true
    pii_check: true
    url_check: true
    blocklist: []
  audit:
    enabled: true
    path: logs/audit.jsonl
    max_size_mb: 100
    rotate: true
